name: Build Windows x64 ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: Build/WinMergeDownloadDeps
        key: ${{ runner.os }}-winmerge-download-deps-v3-${{ hashFiles('DownloadDeps.cmd') }}
        restore-keys: |
          ${{ runner.os }}-winmerge-download-deps-v3-

    - name: Build x64 zip
      shell: cmd
      run: |
        call .\DownloadDeps.cmd
        if errorlevel 1 exit /b 1
        call .\BuildManual.cmd
        if errorlevel 1 exit /b 1
        call .\BuildBin.vs2022.cmd x64
        if errorlevel 1 exit /b 1
        for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -version [17.0^,18.0^) -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set InstallDir=%%i
        if not defined InstallDir exit /b 1
        call "%InstallDir%\Common7\Tools\VsDevCmd.bat"
        if errorlevel 1 exit /b 1
        MSBuild WinMerge.sln /t:UnitTests:Rebuild /p:Configuration=Test /p:Platform=x64
        if errorlevel 1 exit /b 1
        call .\Testing\GoogleTest\UnitTests\UnitTests.exe
        if errorlevel 1 exit /b 1
        call .\BuildTranslations.cmd
        if errorlevel 1 exit /b 1
        if not exist "Build\x64\Release\WinMergeU.exe" (
          echo WinMergeU.exe was not produced under Build\x64\Release
          dir /s /b Build\*.exe
          exit /b 1
        )

    - name: Normalize x64 build outputs
      shell: pwsh
      run: |
        $expectedDir = "Build/X64/Release"
        New-Item -ItemType Directory -Force -Path $expectedDir | Out-Null

        $exe = Get-ChildItem -Path Build -Recurse -Filter WinMergeU.exe | Select-Object -First 1
        if ($null -eq $exe) {
          throw "WinMergeU.exe not found anywhere under Build/"
        }
        $expectedExe = Join-Path $expectedDir "WinMergeU.exe"
        if (([System.IO.Path]::GetFullPath($exe.FullName)).ToLowerInvariant() -ne ([System.IO.Path]::GetFullPath($expectedExe)).ToLowerInvariant()) {
          Copy-Item $exe.FullName $expectedExe -Force
        }

        $manifest = Get-ChildItem -Path Build -Recurse -Filter WinMergeU.exe.manifest | Select-Object -First 1
        if ($null -ne $manifest) {
          $expectedManifest = Join-Path $expectedDir "WinMergeU.exe.manifest"
          if (([System.IO.Path]::GetFullPath($manifest.FullName)).ToLowerInvariant() -ne ([System.IO.Path]::GetFullPath($expectedManifest)).ToLowerInvariant()) {
            Copy-Item $manifest.FullName $expectedManifest -Force
          }
        }

        $pdb = Get-ChildItem -Path Build -Recurse -Filter WinMergeU.pdb | Select-Object -First 1
        if ($null -ne $pdb) {
          $expectedPdb = Join-Path $expectedDir "WinMergeU.pdb"
          if (([System.IO.Path]::GetFullPath($pdb.FullName)).ToLowerInvariant() -ne ([System.IO.Path]::GetFullPath($expectedPdb)).ToLowerInvariant()) {
            Copy-Item $pdb.FullName $expectedPdb -Force
          }
        }

    - name: Build x64 archive
      shell: cmd
      run: |
        call .\BuildArc.cmd x64 -ci
        if errorlevel 1 exit /b 1

    - name: Validate and repack zip
      shell: pwsh
      run: |
        $exe = "Build/X64/Release/WinMergeU.exe"
        $manifest = "Build/X64/Release/WinMergeU.exe.manifest"
        $stageDir = "Build/Releases/x64-zip-version/WinMerge"
        $zip = Get-ChildItem "Build/Releases/*-x64-exe.zip" | Select-Object -First 1

        if (!(Test-Path $exe)) {
          throw "Missing build output: $exe"
        }
        if (!(Test-Path $stageDir)) {
          throw "Missing staging directory: $stageDir"
        }
        if ($null -eq $zip) {
          throw "Missing packaged zip under Build/Releases"
        }

        Copy-Item $exe "$stageDir/WinMergeU.exe" -Force
        if (Test-Path $manifest) {
          Copy-Item $manifest "$stageDir/WinMergeU.exe.manifest" -Force
        }

        Remove-Item $zip.FullName -Force
        & 7z.exe a -tzip $zip.FullName "$stageDir" | Out-Host
        if ($LASTEXITCODE -ne 0) {
          throw "7z repack failed with exit code $LASTEXITCODE"
        }

        $zipList = (& 7z.exe l $zip.FullName | Out-String)
        if ($zipList -notmatch 'WinMergeU\.exe') {
          throw "Packaged zip does not contain WinMergeU.exe"
        }

    - name: Upload zip
      uses: actions/upload-artifact@v4
      with:
        name: WinMerge-x64.zip
        path: Build/Releases/*-x64-exe.zip
